<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Leaflet Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Crear mapa centrado en Colombia
        const map = L.map('map').setView([4.7110, -74.0721], 6);
        
        // Agregar tiles de OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Agregar algunos marcadores de prueba
        L.marker([6.2476, -75.5658]).addTo(map)
            .bindPopup('Medellín');
        
        L.marker([4.7110, -74.0721]).addTo(map)
            .bindPopup('Bogotá');
        
        L.marker([3.4516, -76.5320]).addTo(map)
            .bindPopup('Cali');
        
        console.log('Mapa cargado correctamente');
    </script>
</body>
</html>
